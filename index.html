<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #6366f1, #22d3ee);
    margin: 0;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
}

.header {
    text-align: center;
}

.logo {
    width: 100px;
}

.title {
    font-size: 22px;
    font-weight: 600;
}

.subtitle {
    font-size: 14px;
    color: #555;
}

.input-box {
    margin-top: 25px;
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    background: #4f46e5;
    color: white;
    cursor: pointer;
}

.result {
    margin-top: 25px;
    display: none;
}

.card {
    background: #f9fafb;
    padding: 20px;
    border-radius: 15px;
}

.status {
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
    margin-top: 15px;
    text-align: center;
}

.lulus {
    background: #dcfce7;
    color: #166534;
}

.tidak {
    background: #fee2e2;
    color: #991b1b;
}

table {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 10px;
    border: 1px solid #ccc;
    text-align: center;
}

th {
    background: #4f46e5;
    color: white;
}

.footer {
    text-align: right;
    margin-top: 15px;
}

.print-btn {
    background: #16a34a;
}

.bold {
    font-weight: bold;
}

@media print {
    button, .input-box {
        display: none;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <img src="logo_sman10.png" class="logo"><br>
        <div class="title">PENGUMUMAN KELULUSAN</div>
        <div class="subtitle">Masukkan NISN dan Tanggal Lahir</div>
    </div>

    <div class="input-box">
        <input type="text" id="nisn" placeholder="Masukkan NISN">
        <input type="text" id="tgl" placeholder="Tanggal Lahir (dd/mm/yyyy)">
        <button onclick="cekData()">Cek</button>
    </div>

    <div class="result" id="result">
        <div class="card" id="areaCetak">

            <div style="text-align:center; margin-bottom:15px;">
                <img src="logo_sman10.png" style="width:100px"><br>
                <b>SMAN 10 KABUPATEN TANGERANG</b><br>
                <small>Tahun Pelajaran 2025/2026</small>
                <hr>
            </div>

            <p class="bold" id="nama"></p>
            <p class="bold" id="kelas"></p>
            <p class="bold" id="info"></p>

            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Mata Pelajaran</th>
                        <th>Nilai</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>

            <p class="bold" id="total"></p>
            <p class="bold" id="rata"></p>

            <div id="status" class="status"></div>

            <div class="footer">
                <button class="print-btn" onclick="cetakPDF()">Cetak PDF</button>
            </div>

        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>

const dataSiswa = [
{
    nisn: "9988776655",
    tgl: "2005-01-01",
    nama: "Budi Santoso",
    kelas: "Fase F L.1",
    nilai: [
        ["Agama",90],
        ["PPKN",92],
        ["Indonesia",95],
        ["Matematika",89],
        ["Inggris",90],
        ["Fisika",88],
        ["Kimia",90],
        ["Biologi",93]
    ]
}
];

function formatTanggal(input) {
    const parts = input.split("/");
    if (parts.length !== 3) return null;
    const [dd, mm, yyyy] = parts;
    return `${yyyy}-${mm}-${dd}`;
}

document.getElementById("tgl").addEventListener("input", function(e) {
    let v = e.target.value.replace(/\D/g, "");
    if (v.length >= 2) v = v.slice(0,2) + "/" + v.slice(2);
    if (v.length >= 5) v = v.slice(0,5) + "/" + v.slice(5,9);
    e.target.value = v;
});

function cekData() {
    const nisn = document.getElementById("nisn").value;
    const tgl = formatTanggal(document.getElementById("tgl").value);

    if (!tgl) {
        alert("Format tanggal salah!");
        return;
    }

    const siswa = dataSiswa.find(s => s.nisn === nisn && s.tgl === tgl);

    if (!siswa) {
        alert("Data tidak ditemukan!");
        return;
    }

    document.getElementById("result").style.display = "block";

    document.getElementById("nama").innerText = "Nama: " + siswa.nama;
    document.getElementById("kelas").innerText = "Kelas: " + siswa.kelas;
    document.getElementById("info").innerText = "NISN: " + siswa.nisn;

    let tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    let total = 0;

    siswa.nilai.forEach((n, i) => {
        total += n[1];
        tbody.innerHTML += `
        <tr>
            <td>${i+1}</td>
            <td>${n[0]}</td>
            <td>${n[1]}</td>
        </tr>`;
    });

    let rata = total / siswa.nilai.length;

    document.getElementById("total").innerText = "Jumlah Nilai: " + total;
    document.getElementById("rata").innerText = "Rata-rata: " + rata.toFixed(2);

    let statusDiv = document.getElementById("status");

    if (rata >= 70) {
        statusDiv.innerText = "🎉 LULUS";
        statusDiv.className = "status lulus";
    } else {
        statusDiv.innerText = "❌ TIDAK LULUS";
        statusDiv.className = "status tidak";
    }
}

// FIX PDF ERROR + FALLBACK
function cetakPDF() {
    const element = document.getElementById("areaCetak");

    try {
        html2pdf().set({
            margin: 0.5,
            filename: 'bukti_kelulusan.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        }).from(element).save();
    } catch (e) {
        alert("PDF gagal, menggunakan print biasa");
        window.print();
    }
}

</script>

</body>
</html>
